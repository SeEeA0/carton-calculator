<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogiCalc - 스마트 카톤 & 파레트 계산기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* Gemini Inspired Modern Theme */
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --accent: #1a73e8; 
      --success: #1e8e3e;
      --danger: #d93025;
      --hover: #f1f3f4;
      --shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
      --radius: 12px;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 40px 20px 80px; /* 푸터 공간 확보 */
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg); color: var(--ink);
      line-height: 1.5;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    /* Header */
    h1 { font-size: 32px; font-weight: 500; margin: 0 0 8px; text-align: center; color: var(--ink); }
    .sub { text-align: center; color: var(--muted); margin: 0 0 40px; font-size: 16px; }

    /* Layout */
    .grid { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 24px;
      margin-bottom: 24px; transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: var(--shadow); }

    .section-title {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      margin-bottom: 20px; color: var(--accent); letter-spacing: 0.5px;
    }

    /* Inputs */
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .input-group.three { grid-template-columns: repeat(3, 1fr); }
    .input-item { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 12px; color: var(--muted); font-weight: 600; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 8px;
      border: 1px solid var(--line); font-size: 15px; outline: none;
      background: #fff; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

    /* Buttons */
    .btn {
      width: 100%; padding: 14px; border: 0; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .btn:not(.gray):not(.dark) { background: var(--accent); color: #fff; }
    .btn:not(.gray):not(.dark):hover { background: #1765cc; }
    .btn.dark { background: #3c4043; color: #fff; }
    .btn.gray { background: transparent; border: 1px solid var(--line); color: var(--muted); }
    .btn.gray:hover { background: var(--hover); }

    /* Tables */
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; min-width: 800px; background: white; }
    th { background: #f8f9fa; color: var(--muted); font-size: 11px; font-weight: 700; padding: 12px; text-align: left; }
    td { padding: 14px 12px; border-bottom: 1px solid var(--line); font-size: 14px; }
    .clickable-row:hover { background: var(--hover); cursor: pointer; }
    .selected-row td { background: #e8f0fe !important; font-weight: 600; }
    .best td { background: #f1f8e9; }
    .badge { padding: 4px 8px; border-radius: 4px; background: var(--success); color: #fff; font-size: 10px; font-weight: 700; }

    /* Visualization */
    .visual-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; color: var(--ink); text-align: center;}
    .carton-viz {
      width: 100%; max-width: 400px; margin: 0 auto; border: 1.5px solid #3c4043;
      background: #fff; display: grid; gap: 1px; padding: 4px;
    }
    .carton-cell { background: #f1f3f4; border: 1px solid #dadce0; }

    .pallet-stage {
      width: 100%; max-width: 380px; aspect-ratio: 1/1; margin: 0 auto;
      background: #f8f9fa; border: 1px solid var(--line); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .pallet-inner { position: relative; aspect-ratio: 1/1; background: #fff; border: 1px dashed #bdc1c6; }
    .pallet-box {
      position: absolute; background: #e8f0fe; border: 1.2px solid var(--accent);
      border-radius: 2px;
    }
    .pallet-box.rotated { background: #fef7e0; border-color: #f9ab00; }
    .pallet-box.selected { outline: 2.5px solid var(--accent); z-index: 10; }
    .pallet-box.bad { background: #fce8e6; border-color: var(--danger); }

    /* Summary */
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .summary-item {
      background: #f8f9fa; border: 1px solid var(--line); border-radius: 8px; padding: 16px; text-align: center;
    }
    .summary-item b { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .summary-item span { font-size: 18px; font-weight: 600; color: var(--ink); }

    /* Footer */
    .footer-credit {
      text-align: center; font-size: 10px; color: #bdc1c6; margin-top: 40px; letter-spacing: 0.5px;
    }

    .editor-toolbar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
    .mini-btn { border: 1px solid var(--line); background: #fff; border-radius: 4px; padding: 6px 12px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .mini-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .note { font-size: 11px; color: var(--muted); margin-top: 10px; }
    .warn { color: var(--danger); }
    .result-actions { display: flex; gap: 10px; margin-top: 30px; justify-content: center; }
    .result-actions .btn { width: 160px; }

    @media(max-width:900px){ .grid { grid-template-columns: 1fr; } .summary { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="container" id="input-page">
    <h1>LogiCalc</h1>
    <p class="sub">Logistics Simulation Tool</p>

    <div class="grid">
      <div>
        <div class="card">
          <div class="section-title">Product Info</div>
          <div class="input-item"><label>업체명</label><input type="text" id="companyName" placeholder="Customer Name"></div>
          <div class="input-item"><label>제품명</label><input type="text" id="productName" placeholder="Product Name"></div>
        </div>

        <div class="card">
          <div class="section-title">1. Measurement</div>
          <div class="input-item"><label>생산 총 수량 (ea)</label><input type="number" id="totalQty" value="5000"></div>
          <div class="input-item"><label>단품 무게 (g)</label><input type="number" id="pG" value="76.8" step="0.1"></div>
          <div class="input-group three">
            <div class="input-item"><label>가로 (mm)</label><input type="number" id="pW" value="58" step="0.1"></div>
            <div class="input-item"><label>세로 (mm)</label><input type="number" id="pL" value="23.5" step="0.1"></div>
            <div class="input-item"><label>높이 (mm)</label><input type="number" id="pH" value="143" step="0.1"></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">2. Carton Condition</div>
          <div class="input-group">
            <div class="input-item"><label>박스 중량 제한 (kg)</label><input type="number" id="maxKg" value="15" step="0.1"></div>
            <div class="input-item"><label>빈 박스 무게 (g)</label><input type="number" id="boxWeight" value="0"></div>
          </div>
          <div class="input-group">
            <div class="input-item"><label>제품간 여유 (mm)</label><input type="number" id="gap" value="0"></div>
            <div class="input-item"><label>박스 외곽 여유 (mm)</label><input type="number" id="margin" value="20"></div>
          </div>
          <div class="input-group">
            <div class="input-item"><label>최대 가로 (mm)</label><input type="number" id="maxBoxW" value="500"></div>
            <div class="input-item"><label>최대 세로 (mm)</label><input type="number" id="maxBoxL" value="500"></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">3. Pallet Standard</div>
          <div class="input-group">
            <div class="input-item"><label>파레트 규격 (mm)</label><input type="number" id="palletOuter" value="1100"></div>
            <div class="input-item"><label>적재 가능 영역 (mm)</label><input type="number" id="palletUse" value="1000"></div>
          </div>
        </div>
        <button class="btn" onclick="calculate()">Simulation Start</button>
      </div>

      <div class="card">
        <div class="section-title">Analysis Candidates</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>추천</th><th>구조</th><th>입수</th><th>규격</th><th>박스/단</th><th>중량</th><th>방식</th></tr>
            </thead>
            <tbody id="previewRows"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="footer-credit">DESIGN BY 디자인팀</div>
  </div>

  <div class="container" id="result-page">
    <div id="capture-area">
      <div class="card">
        <h1>Analysis Report</h1>
        <p class="sub" id="resMeta"></p>
        <div class="summary">
          <div class="summary-item"><b>입수량</b><span id="resBoxQty">0</span></div>
          <div class="summary-item"><b>박스 규격</b><span id="resBoxSize">0</span></div>
          <div class="summary-item"><b>필요 박스</b><span id="resTotalBoxes">0</span></div>
          <div class="summary-item"><b>적재 단수</b><span id="resTotalLayers">0</span></div>
        </div>
      </div>

      <div class="card no-export">
        <div class="section-title">Selection & Manual Input</div>
        <div class="input-group" style="margin-bottom:20px; max-width: 450px;">
          <div class="input-item"><label>수동 가로 입수</label><input type="number" id="manualX" placeholder="X"></div>
          <div class="input-item"><label>수동 세로 입수</label><input type="number" id="manualY" placeholder="Y"></div>
          <button class="btn" type="button" onclick="applyManualCarton()" style="grid-column: span 2;">Apply Manual Structure</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>선택</th><th>구조</th><th>입수</th><th>규격</th><th>박스/단</th><th>중량</th><th>방식</th></tr>
            </thead>
            <tbody id="resultCandidateRows"></tbody>
          </table>
        </div>
      </div>

      <div class="grid" style="grid-template-columns: 1fr 1fr;">
        <div class="card">
          <div class="visual-title">Carton Layout</div>
          <div id="cartonViz" class="carton-viz"></div>
          <p class="note" id="cartonText" style="text-align:center; margin-top:20px; font-weight: 600;"></p>
        </div>
        <div class="card">
          <div class="visual-title">Pallet Simulation</div>
          <div class="editor-toolbar">
            <button class="mini-btn" id="palletEditBtn" onclick="togglePalletEditMode()">수동 편집</button>
            <button class="mini-btn" onclick="rotateSelectedPalletBox()">회전</button>
            <button class="mini-btn" onclick="addPalletBox()">추가</button>
            <button class="mini-btn" onclick="removeSelectedPalletBox()" style="color:var(--danger)">삭제</button>
            <button class="mini-btn" onclick="resetPalletBoxes()">리셋</button>
          </div>
          <div class="pallet-stage"><div id="palletViz" class="pallet-inner"></div></div>
          <p class="note" id="palletText" style="text-align:center; margin-top:20px; font-weight: 600; color: var(--accent);"></p>
          <p class="note" id="manualPalletText" style="text-align:center;"></p>
        </div>
      </div>
      <div class="footer-credit" style="margin-top: 20px;">DESIGN BY 디자인팀</div>
    </div>

    <div class="result-actions">
      <button class="btn gray" onclick="backToInput()">Modify</button>
      <button class="btn dark" onclick="downloadImg()">Save Image</button>
    </div>
  </div>

<script>
/* LOGIC 원본 유지 */
let lastResult=null;
let lastCandidates=[];
let selectedCandidateIndex=0;
let palletEditMode=false;
let selectedPalletBox=null;
const $=id=>document.getElementById(id);
const n=id=>parseFloat($(id).value)||0;
const i=id=>parseInt($(id).value,10)||0;
const fmt=(v,d=0)=>Number.isFinite(v)?Number(v).toLocaleString('ko-KR',{maximumFractionDigits:d}):'0';

function getData(){
  return {
    company:$('companyName').value.trim(), product:$('productName').value.trim(), total:i('totalQty'),
    w:n('pW'), l:n('pL'), h:n('pH'), g:n('pG'), maxKg:n('maxKg'), boxWeight:n('boxWeight'),
    gap:n('gap'), margin:n('margin'), maxBoxW:Math.min(500,n('maxBoxW')||500), maxBoxL:Math.min(500,n('maxBoxL')||500), maxBoxH:Infinity,
    palletOuter:n('palletOuter'), palletUse:n('palletUse')
  }
}

function cartonSize(x,y,z,o,d){
  return {
    w: Math.ceil(x*o.w + Math.max(0,x-1)*d.gap + d.margin*2),
    l: Math.ceil(y*o.l + Math.max(0,y-1)*d.gap + d.margin*2),
    h: Math.ceil(z*o.h + Math.max(0,z-1)*d.gap + d.margin*2)
  };
}

const palletCache = new Map();
function rectsOverlap(a,b){return !(a.x+a.w<=b.x || b.x+b.w<=a.x || a.y+a.l<=b.y || b.y+b.l<=a.y)}
function canPlaceRect(candidate, placements, use){
  if(candidate.x<0 || candidate.y<0 || candidate.x+candidate.w>use || candidate.y+candidate.l>use) return false;
  return !placements.some(p=>rectsOverlap(candidate,p));
}
function scoreSpiralCandidate(placements,use){
  if(!placements.length) return {score:0};
  const area=placements.reduce((sum,p)=>sum+(p.w*p.l),0);
  const fillScore=area/(use*use);
  const cx=use/2, cy=use/2;
  let momentX=0, momentY=0;
  placements.forEach(p=>{const a=p.w*p.l; momentX+=((p.x+p.w/2)-cx)*a; momentY+=((p.y+p.l/2)-cy)*a;});
  const totalArea=Math.max(1,area);
  const balanceScore=1-Math.min(1,(Math.abs(momentX)+Math.abs(momentY))/(totalArea*use));
  const centerBox={x:use*.40,y:use*.40,w:use*.20,l:use*.20};
  const centerHits=placements.filter(p=>rectsOverlap(p,centerBox)).length;
  const centerScore=centerHits===0?1:Math.max(0,1-centerHits/4);
  return {score:placements.length*100000 + balanceScore*10000 + centerScore*5000 + fillScore*1000};
}
function palletFitSpiral(boxW,boxL,use){
  const orientations=[{w:boxW,l:boxL,rot:false},{w:boxL,l:boxW,rot:true}];
  const results=[];
  orientations.forEach(startOri=>{
    const placements=[];
    let left=0, top=0, right=use, bottom=use, loop=0;
    while(left<right && top<bottom && loop<400){
      let added=false;
      let x=left;
      while(x+startOri.w<=right){const item={x,y:top,w:startOri.w,l:startOri.l,rot:startOri.rot}; if(canPlaceRect(item,placements,use)){placements.push(item); added=true;} x+=startOri.w;}
      top+=startOri.l;
      let y=top;
      while(y+startOri.l<=bottom){const item={x:right-startOri.w,y,w:startOri.w,l:startOri.l,rot:startOri.rot}; if(canPlaceRect(item,placements,use)){placements.push(item); added=true;} y+=startOri.l;}
      right-=startOri.w;
      x=right-startOri.w;
      while(x>=left){const item={x,y:bottom-startOri.l,w:startOri.w,l:startOri.l,rot:startOri.rot}; if(canPlaceRect(item,placements,use)){placements.push(item); added=true;} x-=startOri.w;}
      bottom-=startOri.l;
      y=bottom-startOri.l;
      while(y>=top){const item={x:left,y,w:startOri.w,l:startOri.l,rot:startOri.rot}; if(canPlaceRect(item,placements,use)){placements.push(item); added=true;} y-=startOri.l;}
      left+=startOri.w;
      if(!added) break;
      if((right-left)<Math.min(boxW,boxL)*1.4 || (bottom-top)<Math.min(boxW,boxL)*1.4) break;
      loop++;
    }
    const s=scoreSpiralCandidate(placements,use);
    results.push({name:'회오리 적재',placements,count:placements.length,rot:startOri.rot,...s});
  });
  return results.sort((a,b)=>b.score-a.score)[0] || {name:'일반 적재',placements:[],count:0,score:0};
}
function palletFit(boxW,boxL,use){
  const key=`${Math.round(boxW)}_${Math.round(boxL)}_${Math.round(use)}`;
  if(palletCache.has(key)) return palletCache.get(key);
  const spiral=palletFitSpiral(boxW,boxL,use);
  const normals=[{name:'정방향 적재',w:boxW,l:boxL,rot:false},{name:'회전 적재',w:boxL,l:boxW,rot:true}].map(o=>{
    const placements=[]; const cols=Math.floor(use/o.w), rows=Math.floor(use/o.l);
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++) placements.push({x:x*o.w,y:y*o.l,w:o.w,l:o.l,rot:o.rot});
    return {name:o.name,placements,count:placements.length,score:placements.length*100000};
  });
  const best=[spiral,...normals].sort((a,b)=>b.score-a.score)[0];
  palletCache.set(key,best);
  return best;
}

function makeCandidates(d){
  const maxQtyByWeight=Math.max(0,Math.floor(((d.maxKg*1000)-d.boxWeight-1)/d.g));
  const orientations=[{name:'정방향',w:d.w,l:d.l,h:d.h},{name:'90도 회전',w:d.l,l:d.w,h:d.h}];
  const list=[];
  orientations.forEach(o=>{
    const maxX=Math.max(1,Math.floor((d.maxBoxW-d.margin*2+d.gap)/(o.w+d.gap)));
    const maxY=Math.max(1,Math.floor((d.maxBoxL-d.margin*2+d.gap)/(o.l+d.gap)));
    for(let x=1;x<=maxX;x++) for(let y=1;y<=maxY;y++){
      const qty=x*y;
      if(qty<1 || qty>maxQtyByWeight) continue;
      const size=cartonSize(x,y,1,o,d);
      if(size.w>d.maxBoxW || size.l>d.maxBoxL) continue;
      const kg=(qty*d.g+d.boxWeight)/1000;
      if(kg>=d.maxKg) continue;
      const fit=palletFit(size.w,size.l,d.palletUse);
      list.push({x,y,qty,size,kg,orientation:o.name,palletFit:fit,score:qty*fit.count});
    }
  });
  return list.sort((a,b)=>b.score-a.score).slice(0,8);
}

function renderPreview(){
  const d=getData();
  const rows=makeCandidates(d);
  $('previewRows').innerHTML=rows.map((r,idx)=>`<tr class="${idx===0?'best':''}"><td>${idx===0?'<span class="badge">BEST</span>':idx+1}</td><td>${r.x}×${r.y}</td><td>${fmt(r.qty)}ea</td><td>${fmt(r.size.w)}×${fmt(r.size.l)}</td><td>${fmt(r.palletFit.count)}</td><td>${fmt(r.kg,2)}kg</td><td>${r.palletFit.name}</td></tr>`).join('');
}
let previewTimer=null;
document.addEventListener('input',()=>{clearTimeout(previewTimer);previewTimer=setTimeout(renderPreview,180);});
renderPreview();

function drawCarton(c){
  const el=$('cartonViz');
  el.innerHTML='';
  el.style.aspectRatio=`${c.size.w}/${c.size.l}`;
  el.style.gridTemplateColumns=`repeat(${c.x},1fr)`;
  el.style.gridTemplateRows=`repeat(${c.y},1fr)`;
  for(let k=0;k<c.x*c.y;k++){const cell=document.createElement('div');cell.className='carton-cell';el.appendChild(cell);}
}
function togglePalletEditMode(){palletEditMode=!palletEditMode;$('palletEditBtn').classList.toggle('active',palletEditMode);if(lastResult){drawPallet(lastResult.d,lastResult.fit);}}
function selectPalletBox(box){document.querySelectorAll('#palletViz .pallet-box').forEach(b=>b.classList.remove('selected'));selectedPalletBox=box;if(box) box.classList.add('selected');}
function startDragPalletBox(e){
  if(!palletEditMode) return;
  e.preventDefault();
  const box=e.currentTarget; selectPalletBox(box);
  const area=$('palletViz'); const rect=area.getBoundingClientRect(); const boxRect=box.getBoundingClientRect();
  const startX=(e.touches?e.touches[0].clientX:e.clientX); const startY=(e.touches?e.touches[0].clientY:e.clientY);
  const startLeft=boxRect.left-rect.left; const startTop=boxRect.top-rect.top;
  function move(ev){
    ev.preventDefault();
    const x=(ev.touches?ev.touches[0].clientX:ev.clientX); const y=(ev.touches?ev.touches[0].clientY:ev.clientY);
    let nx=Math.round((startLeft+x-startX)/4)*4; let ny=Math.round((startTop+y-startY)/4)*4;
    nx=Math.max(0,Math.min(nx,rect.width-box.offsetWidth)); ny=Math.max(0,Math.min(ny,rect.height-box.offsetHeight));
    box.style.left=(nx/rect.width*100)+'%'; box.style.top=(ny/rect.height*100)+'%'; checkPalletCollisions(); updateManualPalletCount();
  }
  function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);}
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
}
function rotateSelectedPalletBox(){
  if(!selectedPalletBox) return;
  const w=parseFloat(selectedPalletBox.style.width); const h=parseFloat(selectedPalletBox.style.height);
  selectedPalletBox.style.width=h+'%'; selectedPalletBox.style.height=w+'%'; selectedPalletBox.classList.toggle('rotated');
  checkPalletCollisions(); updateManualPalletCount();
}
function addPalletBox(){
  if(!lastResult) return;
  palletEditMode=true; $('palletEditBtn').classList.add('active');
  const d=lastResult.d,c=lastResult.c,el=$('palletViz');
  const unit=document.createElement('div'); unit.className='pallet-box editable';
  unit.style.width=(c.size.w/d.palletUse*100)+'%'; unit.style.height=(c.size.l/d.palletUse*100)+'%';
  unit.style.left='0%'; unit.style.top='0%';
  unit.addEventListener('mousedown',startDragPalletBox); el.appendChild(unit); selectPalletBox(unit); updateManualPalletCount();
}
function removeSelectedPalletBox(){if(selectedPalletBox){selectedPalletBox.remove(); selectedPalletBox=null; updateManualPalletCount();}}
function updateManualPalletCount(){
  if(!lastResult) return;
  const count=document.querySelectorAll('#palletViz .pallet-box').length;
  const totalLayers=count?Math.ceil(lastResult.totalBoxes/count):0;
  $('resTotalLayers').textContent=fmt(totalLayers)+'단';
  $('palletText').textContent=`1단 적재: ${fmt(count)}박스`;
}
function resetPalletBoxes(){if(lastResult) drawPallet(lastResult.d,lastResult.fit);}
function checkPalletCollisions(){
  const boxes=[...document.querySelectorAll('#palletViz .pallet-box')]; boxes.forEach(b=>b.classList.remove('bad'));
  const area=$('palletViz'); const ar=area.getBoundingClientRect();
  const rects=boxes.map(b=>{const r=b.getBoundingClientRect();return {el:b,x:r.left-ar.left,y:r.top-ar.top,w:r.width,l:r.height};});
  for(let i=0;i<rects.length;i++) for(let j=i+1;j<rects.length;j++) if(rectsOverlap(rects[i],rects[j])){rects[i].el.classList.add('bad');rects[j].el.classList.add('bad');}
}
function drawPallet(d,fit){
  const el=$('palletViz'); el.innerHTML='';
  const useRatio=Math.max(10,d.palletUse/d.palletOuter*100); el.style.width=useRatio+'%'; el.style.height=useRatio+'%';
  fit.placements.forEach(p=>{
    const unit=document.createElement('div'); unit.className='pallet-box'+(p.rot?' rotated':'')+(palletEditMode?' editable':'');
    unit.style.left=(p.x/d.palletUse*100)+'%'; unit.style.top=(p.y/d.palletUse*100)+'%'; unit.style.width=(p.w/d.palletUse*100)+'%'; unit.style.height=(p.l/d.palletUse*100)+'%';
    unit.addEventListener('mousedown',startDragPalletBox); el.appendChild(unit);
  });
  updateManualPalletCount();
}
function renderResultCandidateRows(){
  $('resultCandidateRows').innerHTML=lastCandidates.map((r,idx)=>`<tr class="clickable-row ${idx===selectedCandidateIndex?'selected-row':''}" onclick="selectCandidate(${idx})"><td>${idx===selectedCandidateIndex?'선택됨':idx+1}</td><td>${r.x}×${r.y}</td><td>${fmt(r.qty)}ea</td><td>${fmt(r.size.w)}×${fmt(r.size.l)}</td><td>${fmt(r.palletFit.count)}</td><td>${fmt(r.kg,2)}kg</td><td>${r.palletFit.name}</td></tr>`).join('');
}
function applyCandidate(idx){
  const d=getData(); const c=lastCandidates[idx]; if(!c) return;
  selectedCandidateIndex=idx; const totalBoxes=Math.ceil(d.total/c.qty);
  lastResult={d,c,fit:c.palletFit,totalBoxes};
  $('resMeta').textContent=`${d.company} / ${d.product} / Total ${fmt(d.total)}ea`;
  $('resBoxQty').textContent=fmt(c.qty)+'ea'; $('resBoxSize').textContent=`${fmt(c.size.w)}×${fmt(c.size.l)}mm`; $('resTotalBoxes').textContent=fmt(totalBoxes)+'박스';
  drawCarton(c); drawPallet(d,c.palletFit); renderResultCandidateRows();
}
function selectCandidate(idx){applyCandidate(idx);}
function applyManualCarton(){
  const d=getData(); const x=i('manualX'); const y=i('manualY');
  if(!x||!y) return;
  const size=cartonSize(x,y,1,{w:d.w,l:d.l,h:d.h},d);
  const kg=(x*y*d.g+d.boxWeight)/1000;
  const fit=palletFit(size.w,size.l,d.palletUse);
  lastCandidates=[{x,y,qty:x*y,size,kg,palletFit:fit}, ...lastCandidates].slice(0,8);
  applyCandidate(0);
}
function calculate(){
  const d=getData(); const candidates=makeCandidates(d);
  if(!candidates.length) return alert('조건에 맞는 조합이 없습니다.');
  lastCandidates=candidates; applyCandidate(0); 
  $('input-page').style.display='none'; $('result-page').style.display='block';
}
function backToInput(){ $('result-page').style.display='none'; $('input-page').style.display='block'; }
function downloadImg(){
  html2canvas($('capture-area'),{backgroundColor:'#ffffff',scale:2}).then(canvas=>{
    const link=document.createElement('a'); link.download='Report.png'; link.href=canvas.toDataURL(); link.click();
  });
}
</script>
</body>
</html>
