<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiCalc - 스마트 적재 계산기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-blue: #0071e3;
            --apple-text: #1d1d1f;
            --apple-gray: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 40px; font-weight: 600; text-align: center; margin-bottom: 40px; letter-spacing: -0.5px; }

        .card {
            background: var(--apple-card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            margin-bottom: 24px;
        }

        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: var(--apple-blue); }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .input-item { display: flex; flex-direction: column; }

        label { font-size: 13px; color: var(--apple-gray); margin-bottom: 6px; margin-left: 4px; }

        input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #d2d2d7;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--apple-blue); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

        .btn-calc {
            width: 100%;
            padding: 16px;
            background-color: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-calc:hover { opacity: 0.9; }

        /* 결과 페이지 스타일 */
        #result-page { display: none; }
        
        .pallet-viz {
            width: 220px; /* 1100mm -> 220px (1/5 scale) */
            height: 220px;
            background: #e0e0e0;
            border: 2px solid #86868b;
            position: relative;
            margin: 20px auto;
        }

        .box-unit {
            position: absolute;
            background: rgba(0, 113, 227, 0.6);
            border: 1px solid #fff;
            box-sizing: border-box;
        }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .summary-item { background: #f9f9f9; padding: 15px; border-radius: 10px; }
        
        .download-btn { background: #333; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="input-page">
    <h1>LogiCalc</h1>
    
    <div class="card">
        <div class="section-title">기본 정보</div>
        <div class="input-group">
            <div class="input-item"><label>업체명</label><input type="text" id="companyName" placeholder="Apple KR"></div>
            <div class="input-item"><label>제품명</label><input type="text" id="productName" placeholder="iPhone 15"></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">1. 카톤박스 제원</div>
        <div class="input-group">
            <div class="input-item"><label>제품 가로 (mm)</label><input type="number" id="pW" value="150"></div>
            <div class="input-item"><label>제품 세로 (mm)</label><input type="number" id="pL" value="80"></div>
            <div class="input-item"><label>제품 높이 (mm)</label><input type="number" id="pH" value="50"></div>
            <div class="input-item"><label>제품 무게 (g)</label><input type="number" id="pG" value="300"></div>
            <div class="input-item"><label>총 주문 수량</label><input type="number" id="totalQty" value="1000"></div>
        </div>
        <p style="font-size: 12px; color: #ff3b30;">* 카톤 규격 제한: 가로/세로 50cm 미만, 무게 15kg 미만</p>
    </div>

    <div class="card">
        <div class="section-title">2. 적재 높이 제한</div>
        <div class="input-item"><label>최대 적재 높이 (mm, 파레트 포함)</label><input type="number" id="maxH" value="1600"></div>
    </div>

    <button class="btn-calc" onclick="calculate()">적재 시뮬레이션 시작</button>
</div>

<!-- 결과 페이지 -->
<div class="container" id="result-page">
    <div id="capture-area">
        <div class="card">
            <h2 style="text-align:center;" id="resTitle">계산 결과 리포트</h2>
            <div class="summary-grid">
                <div class="summary-item"><strong>카톤당 수량:</strong> <span id="resBoxQty">0</span> 개</div>
                <div class="summary-item"><strong>카톤 규격:</strong> <span id="resBoxSize">0</span> mm</div>
                <div class="summary-item"><strong>총 카톤 수:</strong> <span id="resTotalBoxes">0</span> 박스</div>
                <div class="summary-item"><strong>총 파레트 수:</strong> <span id="resTotalPallets">0</span> PLT</div>
            </div>
            
            <h3 style="margin-top:30px;">파레트 1단 적재 (1100x1100)</h3>
            <div class="pallet-viz" id="palletViz"></div>
            <p style="text-align:center; font-size:12px; color:var(--apple-gray);">1단당 박스 수: <span id="boxesPerLayer">0</span>개</p>
        </div>
    </div>
    
    <div style="display:flex; gap:10px;">
        <button class="btn-calc" style="background:#86868b;" onclick="location.reload()">다시 계산</button>
        <button class="btn-calc" onclick="downloadImg()">이미지로 저장</button>
    </div>
</div>

<script>
function calculate() {
    // 1. 카톤 박스 계산 (단순 최적화 로직)
    const pW = parseInt(document.getElementById('pW').value);
    const pL = parseInt(document.getElementById('pL').value);
    const pH = parseInt(document.getElementById('pH').value);
    const pG = parseInt(document.getElementById('pG').value);
    const totalQty = parseInt(document.getElementById('totalQty').value);

    // 카톤 제한 (500mm x 500mm, 15kg)
    // 여기서는 간단하게 가로/세로 배수 계산
    let boxW = 0, boxL = 0, boxH = 0, boxQty = 0;
    
    // 로직 예시: 가로로 몇개, 세로로 몇개 넣을지 (500mm 안넘게)
    let nW = Math.floor(500 / pW);
    let nL = Math.floor(500 / pL);
    let nH = Math.floor((15000 / pG)); // 무게 기준 최대 수량

    // 적정 박스 당 수량 (여기서는 간단히 24개 등으로 고정하거나 로직 설계)
    boxQty = Math.min(nW * nL * 5, nH, 50); // 안전을 위해 최대 50개 제한
    boxW = nW * pW;
    boxL = nL * pL;
    boxH = Math.ceil(boxQty / (nW * nL)) * pH;

    // 2. 파레트 계산 (1100 x 1100 기준)
    const pltSize = 1100;
    let bPerLayer = Math.floor(pltSize / boxW) * Math.floor(pltSize / boxL);
    
    // 3. 높이 제한
    const maxH = parseInt(document.getElementById('maxH').value);
    const pltBaseH = 150; // 파레트 자체 높이
    let layers = Math.floor((maxH - pltBaseH) / boxH);
    let boxesPerPallet = bPerLayer * layers;
    
    let totalBoxes = Math.ceil(totalQty / boxQty);
    let totalPallets = Math.ceil(totalBoxes / boxesPerPallet);

    // UI 반영
    document.getElementById('resBoxQty').innerText = boxQty;
    document.getElementById('resBoxSize').innerText = `${boxW}x${boxL}x${boxH}`;
    document.getElementById('resTotalBoxes').innerText = totalBoxes;
    document.getElementById('resTotalPallets').innerText = totalPallets;
    document.getElementById('boxesPerLayer').innerText = bPerLayer;

    // 시각화 (1100 기준)
    const viz = document.getElementById('palletViz');
    viz.innerHTML = '';
    let scale = 220 / 1100;
    let bW = boxW * scale;
    let bL = boxL * scale;

    for(let i=0; i<Math.floor(pltSize/boxW); i++) {
        for(let j=0; j<Math.floor(pltSize/boxL); j++) {
            const unit = document.createElement('div');
            unit.className = 'box-unit';
            unit.style.width = bW + 'px';
            unit.style.height = bL + 'px';
            unit.style.left = (i * bW) + 'px';
            unit.style.top = (j * bL) + 'px';
            viz.appendChild(unit);
        }
    }

    document.getElementById('input-page').style.display = 'none';
    document.getElementById('result-page').style.display = 'block';
}

function downloadImg() {
    html2canvas(document.querySelector("#capture-area")).then(canvas => {
        const link = document.createElement('a');
        link.download = '적재계산리포트.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
</html>
