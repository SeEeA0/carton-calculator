<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carton Calculator Hub</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --dark-color: #2c3e50;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark-color);
        }

        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--dark-color);
        }

        p.subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .card-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 40px 30px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .card h2 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
        }

        .card p {
            font-size: 0.95rem;
            color: #636e72;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 25px;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .card:hover .btn {
            background: var(--dark-color);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Carton Calculator</h1>
        <p class="subtitle">필요한 계산기 도구를 선택하세요.</p>

        <div class="card-wrapper">
            <a href="https://carton-calculator.pages.dev/yuyu" class="card">
                <div class="icon">📦</div>
                <h2>Yuyu Calculator</h2>
                <p>카톤 규격 및 수량을 <br>빠르고 정확하게 계산합니다.</p>
                <div class="btn">이동하기</div>
            </a>

            <a href="https://carton-calculator.pages.dev/spec-sheet" class="card">
                <div class="icon">📋</div>
                <h2>Spec Sheet</h2>
                <p>제품의 상세 스펙 시트를 <br>작성하고 확인하세요.</p>
                <div class="btn">이동하기</div>
            </a>
        </div>
    </div>

</body>
</html>
